<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>신고 생활정보 사이트 모음 – 신고·민원·정보검색 통합 안내</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --green-dark:  #1B4D3E;
  --green-mid:   #2E6B55;
  --green-light: #E6F2ED;
  --green-pale:  #F2F8F5;
  --accent:      #27AE72;
  --accent-dark: #1F8F5C;
  --text-main:   #1A1A1A;
  --text-sub:    #4A4A4A;
  --text-muted:  #888;
  --border:      #D8E6DF;
  --border-mid:  #B5CFC5;
  --surface:     #FFFFFF;
  --surface-alt: #F7FAFA;
  --radius-sm:   6px;
  --radius-md:   10px;
  --radius-lg:   14px;
  --shadow-sm:   0 1px 4px rgba(0,0,0,.06);
  --shadow-md:   0 4px 16px rgba(0,0,0,.08);
}

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--surface-alt);
  color: var(--text-main);
  line-height: 1.6;
  font-size: 15px;
}

/* ── HEADER ── */
header {
  background: var(--green-dark);
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,.18);
}
.header-inner {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  align-items: center;
  height: 56px;
  gap: 32px;
}
.logo {
  font-size: 20px;
  font-weight: 700;
  color: #fff;
  text-decoration: none;
  letter-spacing: -0.5px;
  flex-shrink: 0;
}
.logo span { color: var(--accent); }

nav { display: flex; gap: 4px; flex: 1; }
.nav-btn {
  background: none;
  border: none;
  color: rgba(255,255,255,.75);
  font-size: 14px;
  font-weight: 500;
  padding: 8px 14px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: background .15s, color .15s;
  font-family: inherit;
}
.nav-btn:hover, .nav-btn.active {
  background: rgba(255,255,255,.12);
  color: #fff;
}
.nav-btn i { font-size: 16px; }

.header-search {
  display: flex;
  align-items: center;
  background: rgba(255,255,255,.12);
  border: 1px solid rgba(255,255,255,.2);
  border-radius: 20px;
  padding: 5px 12px;
  gap: 7px;
  flex-shrink: 0;
}
.header-search input {
  background: none;
  border: none;
  color: #fff;
  font-size: 13px;
  width: 160px;
  font-family: inherit;
  outline: none;
}
.header-search input::placeholder { color: rgba(255,255,255,.5); }
.header-search i { color: rgba(255,255,255,.6); font-size: 15px; }

/* ── HERO ── */
.hero {
  background: linear-gradient(160deg, var(--green-dark) 0%, var(--green-mid) 100%);
  padding: 52px 20px 44px;
  text-align: center;
  color: #fff;
}
.hero h1 {
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 8px;
  letter-spacing: -0.5px;
}
.hero p {
  font-size: 15px;
  color: rgba(255,255,255,.75);
  margin-bottom: 24px;
}
.menu-tabs {
  display: inline-flex;
  background: rgba(255,255,255,.12);
  border-radius: 24px;
  padding: 4px;
  gap: 4px;
}
.menu-tab {
  padding: 9px 24px;
  border-radius: 20px;
  border: none;
  font-family: inherit;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all .18s;
  color: rgba(255,255,255,.75);
  background: none;
}
.menu-tab.active {
  background: #fff;
  color: var(--green-dark);
}

/* ── MAIN ── */
.main {
  max-width: 1100px;
  margin: 0 auto;
  padding: 28px 20px 60px;
}

/* ── WIZARD ── */
.wizard-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 22px 24px;
  margin-bottom: 24px;
  box-shadow: var(--shadow-sm);
}
.wizard-label {
  font-size: 13px;
  font-weight: 500;
  color: var(--green-mid);
  text-transform: uppercase;
  letter-spacing: .05em;
  margin-bottom: 12px;
}
.wizard-q {
  font-size: 17px;
  font-weight: 700;
  margin-bottom: 14px;
  color: var(--text-main);
}
.chip-grid { display: flex; flex-wrap: wrap; gap: 8px; }
.chip-main {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 9px 16px;
  border-radius: 24px;
  border: 1.5px solid var(--border-mid);
  background: var(--surface-alt);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all .15s;
  font-family: inherit;
  color: var(--text-sub);
}
.chip-main:hover {
  border-color: var(--accent);
  background: var(--green-light);
  color: var(--green-dark);
}
.chip-main.selected {
  border-color: var(--accent);
  background: var(--green-light);
  color: var(--green-dark);
}
.chip-main i { font-size: 16px; }

.wizard-step2 {
  display: none;
  margin-top: 18px;
  padding-top: 18px;
  border-top: 1px solid var(--border);
}
.step2-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
}
.back-btn {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 1px solid var(--border-mid);
  background: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  color: var(--text-sub);
  transition: background .12s;
}
.back-btn:hover { background: var(--green-light); }
.step2-q { font-size: 15px; font-weight: 500; }
.chip-sub {
  padding: 8px 16px;
  border-radius: 20px;
  border: 1px solid var(--border-mid);
  background: var(--surface-alt);
  font-size: 13px;
  cursor: pointer;
  transition: all .15s;
  font-family: inherit;
  color: var(--text-sub);
}
.chip-sub:hover {
  border-color: var(--accent);
  background: var(--green-light);
  color: var(--green-dark);
}

/* ── FILTER BAR ── */
.filter-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  align-items: center;
  margin-bottom: 16px;
}
.tag-chips { display: flex; flex-wrap: wrap; gap: 6px; flex: 1; }
.tag-chip {
  padding: 5px 12px;
  border-radius: 16px;
  border: 1px solid var(--border-mid);
  background: var(--surface);
  font-size: 12px;
  cursor: pointer;
  transition: all .12s;
  font-family: inherit;
  color: var(--text-sub);
}
.tag-chip:hover { border-color: var(--accent); color: var(--green-dark); }
.tag-chip.active {
  background: var(--green-dark);
  border-color: var(--green-dark);
  color: #fff;
}
.search-wrap {
  display: flex;
  align-items: center;
  background: var(--surface);
  border: 1px solid var(--border-mid);
  border-radius: 20px;
  padding: 6px 14px;
  gap: 7px;
  flex-shrink: 0;
}
.search-wrap i { color: var(--text-muted); font-size: 15px; }
.search-wrap input {
  border: none;
  outline: none;
  font-size: 13px;
  font-family: inherit;
  width: 180px;
  color: var(--text-main);
  background: none;
}
.filter-actions { display: flex; gap: 8px; align-items: center; }
.btn-ghost {
  font-size: 13px;
  padding: 6px 14px;
  border-radius: 18px;
  border: 1px solid var(--border-mid);
  background: none;
  cursor: pointer;
  font-family: inherit;
  color: var(--text-sub);
  transition: background .12s;
}
.btn-ghost:hover { background: var(--green-light); }
.btn-tree {
  font-size: 13px;
  padding: 6px 14px;
  border-radius: 18px;
  border: 1px solid var(--accent);
  background: none;
  cursor: pointer;
  font-family: inherit;
  color: var(--accent);
  display: flex;
  align-items: center;
  gap: 5px;
  transition: all .12s;
}
.btn-tree:hover { background: var(--green-light); }

/* ── CARD GRID ── */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 14px;
}
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 18px 18px 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  box-shadow: var(--shadow-sm);
  transition: box-shadow .15s, border-color .15s;
}
.card:hover {
  box-shadow: var(--shadow-md);
  border-color: var(--border-mid);
}
.card-top { display: flex; justify-content: space-between; align-items: flex-start; }
.badge {
  font-size: 11px;
  padding: 3px 9px;
  border-radius: 12px;
  font-weight: 500;
}
.badge-gov  { background: #EBF3FB; color: #1B5FA3; }
.badge-pub  { background: var(--green-light); color: var(--green-dark); }
.badge-priv { background: #FEF3E8; color: #A0522D; }
.fav-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 17px;
  color: var(--text-muted);
  padding: 2px;
  line-height: 1;
  transition: color .12s;
}
.fav-btn:hover { color: #E6A817; }
.card-name { font-size: 15px; font-weight: 700; color: var(--text-main); }
.card-org  { font-size: 12px; color: var(--text-muted); margin-top: -4px; }
.card-desc { font-size: 13px; color: var(--text-sub); line-height: 1.55; }
.card-tags { display: flex; flex-wrap: wrap; gap: 5px; }
.card-tag  { font-size: 11px; background: var(--surface-alt); color: var(--text-muted); padding: 2px 9px; border-radius: 10px; border: 1px solid var(--border); }
.card-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-top: 10px;
  border-top: 1px solid var(--border);
  margin-top: auto;
}
.card-phone {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-sub);
  display: flex;
  align-items: center;
  gap: 5px;
}
.card-phone i { font-size: 14px; color: var(--accent); }
.card-link {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 13px;
  padding: 6px 14px;
  border-radius: 18px;
  background: var(--green-dark);
  color: #fff;
  text-decoration: none;
  font-weight: 500;
  transition: background .15s;
}
.card-link:hover { background: var(--green-mid); }
.card-link i { font-size: 13px; }
.card-link.lookup {
  background: none;
  border: 1.5px solid var(--green-dark);
  color: var(--green-dark);
}
.card-link.lookup:hover { background: var(--green-light); }

/* ── EMPTY STATE ── */
.empty-state {
  display: none;
  text-align: center;
  padding: 48px 20px;
  color: var(--text-muted);
}
.empty-state i { font-size: 40px; display: block; margin-bottom: 12px; color: var(--border-mid); }
.empty-state p { font-size: 14px; margin-bottom: 14px; }
.empty-state button {
  font-size: 13px;
  padding: 8px 18px;
  border-radius: 18px;
  border: 1px solid var(--border-mid);
  background: none;
  cursor: pointer;
  font-family: inherit;
  color: var(--text-sub);
}

/* ── TREE VIEW ── */
.tree-view { display: none; }
.tree-section-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: .06em;
  margin: 20px 0 8px;
}
.tree-main-btn {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  color: var(--text-main);
  margin-bottom: 4px;
  transition: background .12s;
}
.tree-main-btn:hover { background: var(--green-light); }
.tree-main-btn i { font-size: 16px; }
.tree-main-btn .ti-chevron-down { font-size: 14px; transition: transform .2s; color: var(--text-muted); }
.tree-main-btn.open .ti-chevron-down { transform: rotate(180deg); }
.tree-sub-wrap {
  display: none;
  padding: 4px 0 8px 16px;
}
.tree-sub-btn {
  display: block;
  width: 100%;
  text-align: left;
  padding: 8px 14px;
  font-size: 13px;
  border: none;
  background: none;
  cursor: pointer;
  font-family: inherit;
  color: var(--text-sub);
  border-radius: var(--radius-sm);
  transition: background .1s;
}
.tree-sub-btn:hover { background: var(--green-light); color: var(--green-dark); }
.tree-result { margin-top: 20px; }

/* ── FOOTER ── */
footer {
  background: var(--green-dark);
  color: rgba(255,255,255,.55);
  text-align: center;
  padding: 24px 20px;
  font-size: 12px;
  line-height: 1.8;
}
footer strong { color: rgba(255,255,255,.8); }

/* ── RESPONSIVE ── */
@media (max-width: 680px) {
  .hero h1 { font-size: 22px; }
  .header-search { display: none; }
  nav { gap: 0; }
  .card-grid { grid-template-columns: 1fr; }
  .filter-bar { flex-direction: column; align-items: stretch; }
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="#" class="logo">신고 생활정보<span> 사이트 모음</span></a>
    <nav>

      </button>

    <div class="header-search">
      <i class="ti ti-search"></i>

    </div>

</header>

<div class="hero">

  <p>정부·공공기관·민간의 신고센터와 정보검색 서비스를 빠르게 찾아드립니다</p>
  <div class="menu-tabs">
    <button class="menu-tab active" id="heroTabReport" onclick="switchMenu('신고/민원')">신고/민원</button>
    <button class="menu-tab" id="heroTabInfo" onclick="switchMenu('정보검색')">정보검색</button>
  </div>
</div>

<div class="main">

  <!-- WIZARD -->
  <div class="wizard-box" id="wizardBox">
    <div class="wizard-label">빠른 찾기</div>
    <div class="wizard-q" id="wizardQ">어떤 문제인가요?</div>
    <div class="chip-grid" id="mainChips"></div>
    <div class="wizard-step2" id="wizardStep2">
      <div class="step2-header">
        <button class="back-btn" onclick="backStep()" aria-label="이전으로">
          <i class="ti ti-arrow-left"></i>
        </button>
        <span class="step2-q">구체적으로 어떤 경우인가요?</span>
      </div>
      <div class="chip-grid" id="subChips"></div>
    </div>
  </div>

  <!-- FILTER BAR -->
  <div class="filter-bar" id="filterBar">
    <div class="tag-chips" id="tagChips"></div>
    <div class="filter-actions">
      <div class="search-wrap">
        <i class="ti ti-search"></i>
        <input id="searchInput" type="text" placeholder="기관명, 키워드 검색" oninput="onSearch(this.value)">
      </div>
      <button class="btn-ghost" onclick="resetAll()">초기화</button>
      <button class="btn-tree" id="treeBtn" onclick="toggleTree()">
        <i class="ti ti-list-tree"></i>트리 보기
      </button>
    </div>
  </div>

  <!-- CARD GRID -->
  <div class="card-grid" id="cardGrid"></div>
  <div class="empty-state" id="emptyState">
    <i class="ti ti-search-off"></i>
    <p>일치하는 항목이 없습니다.</p>
    <button onclick="resetAll()">전체 보기로 돌아가기</button>
  </div>

  <!-- TREE VIEW -->
  <div class="tree-view" id="treeView">
    <div id="treeContainer"></div>
    <div class="tree-result card-grid" id="treeResult"></div>
  </div>

</div>

<footer>
  <strong>신고 생활정보 사이트 모음 (singo.kr) / yenuri337@gmail.com</strong><br>
  본 사이트는 정부·공공기관·민간의 신고·민원·정보검색 서비스를 안내하는 민간 큐레이션 사이트입니다.<br>
  공식 기관 사이트가 아니며, 각 서비스는 해당 기관에서 직접 운영합니다.
</footer>

let currentMenu="신고/민원", activeTags=new Set(), activeMain=null, searchQuery="", treeOpen=false;

function uniqueSubs(menu,main){return[...new Set(DATA.filter(d=>d.menu===menu&&d.main===main).map(d=>d.sub))];}

function switchMenu(menu,btn){
  currentMenu=menu;
  document.querySelectorAll('.nav-btn').forEach(b=>{b.classList.toggle('active',b.dataset.menu===menu);});
  document.getElementById('heroTabReport').classList.toggle('active',menu==='신고/민원');
  document.getElementById('heroTabInfo').classList.toggle('active',menu==='정보검색');
  activeMain=null; activeTags.clear(); searchQuery='';
  document.getElementById('searchInput').value='';
  document.getElementById('wizardStep2').style.display='none';
  if(treeOpen)toggleTree();
  renderMainChips(); renderTagChips(); renderGrid();
}

function renderMainChips(){
  const el=document.getElementById('mainChips');
  document.getElementById('wizardQ').textContent=currentMenu==='신고/민원'?'어떤 문제인가요?':'무엇을 찾으시나요?';
  el.innerHTML=MAIN_CATS[currentMenu].map(c=>`
    <button class="chip-main" data-main="${c.key}" onclick="selectMain('${c.key}')">
      <i class="ti ${c.icon}"></i>${c.key}
    </button>`).join('');
}

function selectMain(main){
  activeMain=main;
  document.querySelectorAll('.chip-main').forEach(b=>b.classList.toggle('selected',b.dataset.main===main));
  const subs=uniqueSubs(currentMenu,main);
  document.getElementById('subChips').innerHTML=subs.map(s=>`<button class="chip-sub" onclick="selectSub('${s}')">${s}</button>`).join('');
  document.getElementById('wizardStep2').style.display='block';
  activeTags.clear(); searchQuery=''; document.getElementById('searchInput').value='';
  renderTagChips(); renderGrid();
}

function selectSub(sub){
  activeTags.clear(); searchQuery=''; document.getElementById('searchInput').value='';
  const filtered=DATA.filter(d=>d.menu===currentMenu&&d.main===activeMain&&d.sub===sub);
  renderCards(filtered); renderTagChips();
}

function backStep(){
  document.getElementById('wizardStep2').style.display='none';
  document.querySelectorAll('.chip-main').forEach(b=>b.classList.remove('selected'));
  activeMain=null; activeTags.clear(); renderTagChips(); renderGrid();
}

function allTags(){return[...new Set(DATA.filter(d=>d.menu===currentMenu).flatMap(d=>d.tags))];}

function renderTagChips(){
  const el=document.getElementById('tagChips');
  const tags=allTags();
  el.innerHTML=`<button class="tag-chip${activeTags.size===0?' active':''}" onclick="clearTags()">전체</button>`
    +tags.map(t=>`<button class="tag-chip${activeTags.has(t)?' active':''}" onclick="toggleTag('${t}')">#${t}</button>`).join('');
}

function toggleTag(t){
  if(activeTags.has(t))activeTags.delete(t);else activeTags.add(t);
  renderTagChips(); renderGrid();
}
function clearTags(){ activeTags.clear(); renderTagChips(); renderGrid(); }

function matchFilter(d){
  if(d.menu!==currentMenu) return false;
  if(activeMain && d.main!==activeMain) return false;
  if(activeTags.size>0 && !d.tags.some(t=>activeTags.has(t))) return false;
  if(searchQuery){
    const q=searchQuery.toLowerCase();
    if(![d.org,d.name,d.desc,...d.tags].some(x=>x.toLowerCase().includes(q))) return false;
  }
  return true;
}

function onSearch(v){ searchQuery=v; renderGrid(); }
function headerSearch(v){ searchQuery=v; document.getElementById('searchInput').value=v; renderGrid(); }
function resetAll(){ activeTags.clear(); searchQuery=''; activeMain=null; document.getElementById('searchInput').value=''; document.getElementById('wizardStep2').style.display='none'; document.querySelectorAll('.chip-main').forEach(b=>b.classList.remove('selected')); renderTagChips(); renderGrid(); }

function cardHTML(d){
  const badgeClass=d.type==='정부'?'badge-gov':d.type==='공공'?'badge-pub':'badge-priv';
  const isLookup=d.stype!=='신고';
  const footer=d.phone&&d.phone!=='-'
    ?`<span class="card-phone"><i class="ti ti-phone"></i>${d.phone}</span>`
    :`<span style="font-size:12px;color:var(--text-muted);">${d.stype}형 서비스</span>`;
  return`<div class="card">
    <div class="card-top">
      <span class="badge ${badgeClass}">${d.type}</span>
      <button class="fav-btn" aria-label="즐겨찾기" title="즐겨찾기"><i class="ti ti-star"></i></button>
    </div>
    <div>
      <div class="card-name">${d.name}</div>
      <div class="card-org">${d.org}</div>
    </div>
    <div class="card-desc">${d.desc}</div>
    <div class="card-tags">${d.tags.map(t=>`<span class="card-tag">#${t}</span>`).join('')}</div>
    <div class="card-footer">
      ${footer}
      <a class="card-link${isLookup?' lookup':''}" href="${d.url}" target="_blank" rel="noopener">
        ${isLookup?'조회·검색':'바로가기'}<i class="ti ti-external-link"></i>
      </a>
    </div>
  </div>`;
}

function renderCards(list){
  const grid=document.getElementById('cardGrid'), empty=document.getElementById('emptyState');
  if(list.length===0){grid.style.display='none';empty.style.display='block';}
  else{grid.style.display='grid';empty.style.display='none';grid.innerHTML=list.map(cardHTML).join('');}
}

function renderGrid(){ renderCards(DATA.filter(matchFilter)); }

function toggleTree(){
  treeOpen=!treeOpen;
  document.getElementById('treeView').style.display=treeOpen?'block':'none';
  document.getElementById('cardGrid').style.display=treeOpen?'none':'grid';
  document.getElementById('emptyState').style.display='none';
  document.getElementById('wizardBox').style.display=treeOpen?'none':'block';
  document.getElementById('filterBar').style.display=treeOpen?'none':'flex';
  const btn=document.getElementById('treeBtn');
  btn.innerHTML=treeOpen?'<i class="ti ti-layout-grid"></i>카드 보기':'<i class="ti ti-list-tree"></i>트리 보기';
  if(treeOpen) renderTree();
}

function renderTree(){
  const c=document.getElementById('treeContainer');
  c.innerHTML=Object.keys(MAIN_CATS).map(menu=>`
    <div class="tree-section-title">${menu}</div>`
    +MAIN_CATS[menu].map(cat=>{
      const subs=uniqueSubs(menu,cat.key);
      const id=`tw_${menu}_${cat.key}`.replace(/[^a-z0-9_]/gi,'_');
      return`<button class="tree-main-btn" onclick="toggleTreeMain(this,'${id}')">
        <span><i class="ti ${cat.icon}"></i> ${cat.key}</span>
        <i class="ti ti-chevron-down"></i>
      </button>
      <div class="tree-sub-wrap" id="${id}">
        ${subs.map(s=>`<button class="tree-sub-btn" onclick="treeSelect('${menu}','${cat.key}','${s}')">${s}</button>`).join('')}
      </div>`;
    }).join('')
  ).join('');
}

function toggleTreeMain(btn,id){
  const wrap=document.getElementById(id);
  const open=wrap.style.display==='block';
  wrap.style.display=open?'none':'block';
  btn.classList.toggle('open',!open);
}

function treeSelect(menu,main,sub){
  const filtered=DATA.filter(d=>d.menu===menu&&d.main===main&&d.sub===sub);
  const r=document.getElementById('treeResult');
  r.className='tree-result card-grid';
  r.innerHTML=filtered.map(cardHTML).join('');
}

switchMenu('신고/민원');
</script>
</body>
</html>
